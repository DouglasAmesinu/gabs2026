// Deterministic thread ID — same for both participants regardless of who initiates
function threadId(idA, idB){ return [idA,idB].sort().join("__"); }

function findBestMatch(participants, lang){
  const senior=["ceo","md","managing director","director","head","partner","founder","coo","cto","cfo","president","vp"];
  const scored=participants.map(p=>{
    let sc=0;
    if(p.country==="Germany")sc+=30;
    if(p.sector==="Finance")sc+=25;
    if(senior.some(s=>p.title.toLowerCase().includes(s)))sc+=20;
    sc+=Math.random()*8;
    return{...p,sc};
  }).sort((a,b)=>b.sc-a.sc);
  const m=scored[0];
  const reason=lang==="de"
    ?`${m.name} von ${m.company} (${m.country}) ist ein idealer GABS-Kontakt. Ihr Fokus auf ${m.sector} und ihre Seniorität bieten eine starke Geschäftsmöglichkeit.`
    :`${m.name} from ${m.company} (${m.country}) is an ideal GABS contact. Their ${m.sector} focus and seniority create a strong cross-border opportunity worth exploring.`;
  return{match:m,reason};
}

// ── Messages view — Firebase real-time ────────────────────────────────────────
function MessagesView({participants,me,openThread,setOpenThread}){
  const lang=useLang(); const t=S[lang];
  const [activeId,setActiveId]=useState(openThread||null);
  const [messages,setMessages]=useState([]);
  const [draft,setDraft]=useState("");
  const [inbox,setInbox]=useState({}); // {participantId: lastMsg}
  const [meetingP,setMeetingP]=useState(null);
  const bottomRef=useRef(null);

  const activeP=activeId?participants.find(p=>p.id===activeId):null;
  const tid=activeP&&me?threadId(me.id,activeP.id):null;

  useEffect(()=>{if(openThread){setActiveId(openThread);}},[ openThread]);

  // Listen to active thread messages
  useEffect(()=>{
    if(!tid||!window._fb)return;
    const fb=window._fb;
    const q=fb.query(fb.collection(fb.db,"threads",tid,"messages"),fb.orderBy("ts","asc"));
    const unsub=fb.onSnapshot(q,snap=>{
      setMessages(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return unsub;
  },[tid]);

  // Auto-scroll on new messages
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  // Build inbox — listen to all threads for this user
  useEffect(()=>{
    if(!me||!window._fb)return;
    const fb=window._fb;
    const unsubs=[];
    participants.filter(p=>p.id!==me.id).forEach(p=>{
      const tid2=threadId(me.id,p.id);
      const q=fb.query(fb.collection(fb.db,"threads",tid2,"messages"),fb.orderBy("ts","desc"));
      const unsub=fb.onSnapshot(q,snap=>{
        setInbox(prev=>{
          const next={...prev};
          if(!snap.empty){next[p.id]={p,last:snap.docs[0].data()};}
          else{delete next[p.id];}
          return next;
        });
      });
      unsubs.push(unsub);
    });
    return()=>unsubs.forEach(u=>u());
  },[me,participants]);

  const sendMsg=async(textOverride,meeting)=>{
    const text=(textOverride||draft).trim();
    if(!text||!tid||!me||!window._fb)return;
    setDraft("");
    const fb=window._fb;
    const payload={text,fromId:me.id,fromName:me.name,fromAvatar:me.avatar,ts:fb.serverTimestamp()};
    if(meeting)payload.meeting=meeting;
    await fb.addDoc(fb.collection(fb.db,"threads",tid,"messages"),payload);
  };

  const handleKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}};

  const inboxList=Object.values(inbox).sort((a,b)=>(b.last?.ts?.seconds||0)-(a.last?.ts?.seconds||0));

  // ── Thread ──
  if(activeP)return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:`1px solid ${LIGHT}`,flexShrink:0,background:"#fff"}}>
        <button onClick={()=>{setActiveId(null);setOpenThread(null);setMessages([]);}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:NAVY,padding:"0 4px 0 0"}}>←</button>
        <Avatar initials={activeP.avatar} size={36}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,color:NAVY,fontSize:14,fontFamily:"'Playfair Display',serif"}}>{activeP.name}</div>
          <div style={{fontSize:12,color:"#999",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{activeP.title} · {activeP.company}</div>
        </div>
        <button onClick={()=>setMeetingP(activeP)} style={{background:LIGHT,border:"none",borderRadius:8,padding:"7px 12px",fontSize:12,color:NAVY,fontWeight:700,cursor:"pointer",flexShrink:0}}>📅 Meet</button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px 18px",display:"flex",flexDirection:"column",gap:10,background:"#F4F8FC"}}>
        {messages.length===0&&<div style={{textAlign:"center",color:"#bbb",fontSize:13,marginTop:48,lineHeight:2}}>💬<br/>Start the conversation</div>}
        {messages.map((m,i)=>{
          const mine=m.fromId===me.id;
          return(
            <div key={m.id||i} style={{alignSelf:mine?"flex-end":"flex-start",maxWidth:"80%",display:"flex",flexDirection:"column",gap:3}}>
              {!mine&&<div style={{fontSize:11,color:"#aaa",paddingLeft:4}}>{m.fromName}</div>}
              <div style={{background:mine?`linear-gradient(135deg,${NAVY},${STEEL})`:LIGHT,color:mine?"#fff":NAVY,padding:"10px 14px",borderRadius:mine?"16px 16px 4px 16px":"16px 16px 16px 4px",fontSize:13,lineHeight:1.5}}>
                {m.text}
                {m.meeting&&<div style={{marginTop:8,padding:"8px 10px",borderRadius:8,background:mine?"rgba(255,255,255,0.2)":`${STEEL}20`,fontSize:12,fontWeight:600}}>📍 {m.meeting.table}<br/>🕐 {m.meeting.time}</div>}
              </div>
              <div style={{fontSize:10,color:"#bbb",alignSelf:mine?"flex-end":"flex-start",padding:"0 4px"}}>
                {m.ts?.seconds?new Date(m.ts.seconds*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):""}
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>

      <div style={{display:"flex",gap:10,padding:"12px 14px",borderTop:`1px solid ${LIGHT}`,background:"#fff",flexShrink:0,alignItems:"flex-end"}}>
        <textarea value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={handleKey} placeholder={t.typeMessage} rows={1} style={{...SS,flex:1,resize:"none",borderRadius:20,padding:"10px 16px",lineHeight:1.5,maxHeight:100,overflowY:"auto"}}/>
        <button onClick={()=>sendMsg()} disabled={!draft.trim()} style={{width:44,height:44,borderRadius:"50%",border:"none",background:draft.trim()?`linear-gradient(135deg,${NAVY},${STEEL})`:"#E0E0E0",color:"#fff",fontSize:18,cursor:draft.trim()?"pointer":"default",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.2s"}}>➤</button>
      </div>

      {meetingP&&<MeetingModal p={meetingP} onClose={()=>setMeetingP(null)} onSend={({table,time,msg})=>{const text=msg||t.proposed;sendMsg(text,{table,time});setMeetingP(null);}} tables={DEFAULT_TABLES} times={DEFAULT_TIMES}/>}
    </div>
  );

  // ── Inbox ──
  return(
    <div style={{padding:"0 18px"}}>
      <div style={{fontWeight:700,color:NAVY,fontSize:20,fontFamily:"'Playfair Display',serif",padding:"18px 0 14px"}}>{t.messages}</div>
      {inboxList.length===0
        ?<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:48,marginBottom:14}}>💬</div><div style={{fontSize:14,color:"#999"}}>{t.noMessages}</div><div style={{fontSize:12,marginTop:8,color:"#bbb"}}>{t.startConv}</div></div>
        :inboxList.map(({p,last})=>(
          <div key={p.id} onClick={()=>setActiveId(p.id)} style={{display:"flex",gap:14,alignItems:"center",padding:"14px 0",borderBottom:`1px solid ${LIGHT}`,cursor:"pointer"}}>
            <Avatar initials={p.avatar} size={44}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,color:NAVY,fontSize:14,fontFamily:"'Playfair Display',serif"}}>{p.name}</div>
              <div style={{color:"#999",fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{last?.text||""}</div>
            </div>
            <div style={{color:STEEL,fontSize:20}}>›</div>
          </div>
        ))
      }
    </div>
  );
}

// ── QR view ───────────────────────────────────────────────────────────────────
function QRView(){
  const t=S[useLang()];
  const qrRef=useRef(null);
  useEffect(()=>{
    if(!qrRef.current||!window.QRCode)return;
    qrRef.current.innerHTML="";
    new QRCode(qrRef.current,{text:APP_URL,width:210,height:210,colorDark:NAVY,colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H});
  },[]);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 24px",gap:22}}>
      <div style={{background:`linear-gradient(135deg,${NAVY},${STEEL})`,borderRadius:24,padding:20,boxShadow:`0 8px 32px ${NAVY}40`}}>
        <div ref={qrRef} style={{background:"#fff",borderRadius:12,padding:10}}/>
      </div>
      <div style={{textAlign:"center"}}>
        <div style={{fontWeight:700,color:NAVY,fontSize:15,fontFamily:"'Playfair Display',serif",marginBottom:6}}>{t.qrTitle}</div>
        <div style={{fontSize:13,color:"#888"}}>{t.qrSub}</div>
        <div style={{fontSize:10,color:"#bbb",marginTop:6,wordBreak:"break-all"}}>{APP_URL}</div>
      </div>
      <div style={{background:LIGHT,borderRadius:16,padding:"14px 18px",width:"100%",maxWidth:380}}>
        <div style={{fontSize:13,color:NAVY,fontWeight:700,marginBottom:8}}>📱 {t.howTitle}</div>
        <div style={{fontSize:12,color:"#555",lineHeight:1.9}}>{t.howAndroid}<br/>{t.howIphone}</div>
      </div>
    </div>
  );
}

// ── Admin modal ───────────────────────────────────────────────────────────────
function AdminModal({onClose,participants,setParticipants,tables,setTables,times,setTimes}){
  const t=S[useLang()];
  const [err,setErr]=useState(""); const [ok,setOk]=useState(""); const [view,setView]=useState("main");
  const [roomsTxt,setRoomsTxt]=useState(tables.join("\n")); const [timesTxt,setTimesTxt]=useState(times.join("\n"));
  const fileRef=useRef(null);
  const parseCSV=text=>{
    const lines=text.trim().split("\n").filter(l=>l.trim());
    if(lines.length<2)throw new Error("Need header + at least one row.");
    const headers=lines[0].split(",").map(h=>h.trim().toLowerCase().replace(/"/g,""));
    const req=["name","company","sector","country","title"];
    const miss=req.filter(r=>!headers.includes(r));
    if(miss.length)throw new Error("Missing: "+miss.join(", "));
    return lines.slice(1).map((line,i)=>{
      const vals=line.split(",").map(v=>v.trim().replace(/"/g,""));
      const row=Object.fromEntries(headers.map((h,idx)=>[h,vals[idx]||""]));
      return{id:String(i+1),...row,avatar:row.name.split(" ").slice(0,2).map(w=>w[0]?.toUpperCase()||"").join("")};
    }).filter(p=>p.name);
  };
  const upload=e=>{const file=e.target.files[0];if(!file)return;setErr("");setOk("");const r=new FileReader();r.onload=ev=>{try{const p=parseCSV(ev.target.result);setParticipants(p);try{localStorage.setItem("gabs_participants",JSON.stringify(p));}catch(e){}setOk("✓ "+p.length+" "+t.loaded);}catch(e){setErr(e.message);}};r.readAsText(file);e.target.value="";};
  const reset=()=>{setParticipants(SAMPLE);try{localStorage.removeItem("gabs_participants");}catch(e){}setOk("✓ Reset.");setErr("");};
  const downloadTpl=()=>{const csv=["name,company,sector,country,title","Kwame Asante,GoldCoast Ventures,Finance,Ghana,CEO"].join("\n");const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="GABS2026_template.csv";document.body.appendChild(a);a.click();document.body.removeChild(a);};
  const saveRooms=()=>{const nr=roomsTxt.split("\n").map(r=>r.trim()).filter(Boolean);const nt=timesTxt.split("\n").map(r=>r.trim()).filter(Boolean);if(!nr.length||!nt.length){setErr("Need at least one room and one time slot.");return;}setTables(nr);setTimes(nt);try{localStorage.setItem("gabs_tables",JSON.stringify(nr));localStorage.setItem("gabs_times",JSON.stringify(nt));}catch(e){}setOk("✓ Saved.");setErr("");setView("main");};
  if(view==="rooms")return(<Overlay><Sheet><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><button onClick={()=>setView("main")} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:NAVY}}>←</button><div style={{fontWeight:800,color:NAVY,fontSize:15,fontFamily:"'Playfair Display',serif"}}>{t.editRooms}</div></div><div style={{fontSize:12,color:"#888",marginBottom:6}}>{t.roomsLabel}</div><textarea value={roomsTxt} onChange={e=>setRoomsTxt(e.target.value)} rows={8} style={{...SS,resize:"none",marginBottom:14,fontSize:13,lineHeight:1.7}}/><div style={{fontSize:12,color:"#888",marginBottom:6}}>{t.timesLabel}</div><textarea value={timesTxt} onChange={e=>setTimesTxt(e.target.value)} rows={7} style={{...SS,resize:"none",marginBottom:16,fontSize:13,lineHeight:1.7}}/>{err&&<div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#C62828",marginBottom:10}}>{err}</div>}<Btn onClick={saveRooms}>{t.saveRooms}</Btn></Sheet></Overlay>);
  return(<Overlay><Sheet><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div><div style={{fontWeight:800,color:NAVY,fontSize:16,fontFamily:"'Playfair Display',serif"}}>⚙️ {t.adminTitle}</div><div style={{fontSize:12,color:"#999",marginTop:2}}>{participants.length} {t.loaded}</div></div><Btn onClick={onClose} variant="ghost" style={{width:"auto",padding:"6px 16px"}}>{t.close}</Btn></div><Btn onClick={downloadTpl} variant="dashed" style={{marginBottom:10}}>{t.downloadTpl}</Btn><input ref={fileRef} type="file" accept=".csv" onChange={upload} style={{display:"none"}}/><Btn onClick={()=>fileRef.current?.click()} style={{marginBottom:10}}>{t.uploadCSV}</Btn><Btn onClick={()=>setView("rooms")} variant="ghost" style={{marginBottom:10}}>🏨 {t.editRooms}</Btn>{ok&&<div style={{background:"#E8F5E9",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#2E7D32",marginBottom:10}}>{ok}</div>}{err&&<div style={{background:"#FFEBEE",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#C62828",marginBottom:10}}>{err}</div>}<Btn onClick={reset} variant="muted" style={{marginBottom:10}}>{t.reset}</Btn><div style={{fontSize:11,color:"#ccc",textAlign:"center",marginTop:6}}>{t.csvHint}</div></Sheet></Overlay>);
}

// ── Footer ────────────────────────────────────────────────────────────────────
function Footer({me,onSwitch}){
  const lang=useLang(); const t=S[lang];
  const pill={padding:"5px 12px",borderRadius:8,border:`1px solid ${LIGHT}`,background:"#fff",display:"flex",alignItems:"center",justifyContent:"center"};
  return(
    <div style={{background:"#fff",borderTop:`1px solid ${LIGHT}`,padding:"10px 18px 18px",flexShrink:0}}>
      {me&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${LIGHT}`}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Avatar initials={me.avatar} size={24}/>
            <div style={{fontSize:12,color:NAVY,fontWeight:600}}>{me.name}</div>
          </div>
          <button onClick={onSwitch} style={{background:"none",border:"none",color:STEEL,fontSize:11,cursor:"pointer",fontWeight:600}}>↩ {t.switchProfile}</button>
        </div>
      )}
      <div style={{fontSize:9,fontWeight:700,letterSpacing:2,color:"#bbb",textTransform:"uppercase",textAlign:"center",marginBottom:8}}>{t.organizers}</div>
      <div style={{display:"flex",gap:10,justifyContent:"center",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"6px 10px",borderRadius:10,border:`1px solid ${LIGHT}`}}>
          <div style={{display:"flex",alignItems:"baseline"}}><span style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:16,color:NAVY}}>S</span><span style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:16,color:"#C49A2A"}}>A</span><span style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:16,color:NAVY}}>FRI</span></div>
          <div style={{fontSize:7,color:"#999",letterSpacing:1,fontWeight:600,textTransform:"uppercase",marginTop:2}}>Subsahara Afrika Initiative</div>
        </div>
        <div style={{width:1,height:30,background:LIGHT}}/>
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:10,border:`1px solid ${LIGHT}`}}>
          <div style={{width:28,height:28,background:STEEL,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontWeight:800,fontSize:10,fontFamily:"'Playfair Display',serif"}}>AHK</span></div>
          <div style={{fontSize:11,color:NAVY,fontWeight:700}}>Ghana</div>
        </div>
      </div>
      <div style={{height:1,background:LIGHT,marginBottom:10}}/>
      <div style={{fontSize:9,fontWeight:700,letterSpacing:2,color:"#bbb",textTransform:"uppercase",textAlign:"center",marginBottom:8}}>{t.partners}</div>
      <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
        <div style={pill}><span style={{color:"#0070B8",fontWeight:800,fontSize:12,fontFamily:"'Playfair Display',serif"}}>BDI</span></div>
        <div style={pill}><span style={{color:"#003DA6",fontWeight:800,fontSize:12,fontFamily:"'Playfair Display',serif"}}>BGA</span></div>
        <div style={{...pill,background:NAVY}}><span style={{color:"#fff",fontWeight:800,fontSize:12,fontFamily:"'Playfair Display',serif"}}>DIHK</span></div>
        <div style={{...pill,padding:"5px 10px"}}><span style={{color:"#111",fontWeight:700,fontSize:10}}>Afrika-Verein</span></div>
      </div>
      <div style={{textAlign:"center",fontSize:10,color:"#ddd",marginTop:10}}>© 2026 GABS · 23–25 Nov · Accra, Ghana</div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App(){
  const [fbReady,setFbReady]=useState(!!window._fb);
  const [lang,setLang]=useState(()=>localStorage.getItem("gabs_lang")||"en");
  const [me,setMe]=useState(()=>{try{const s=localStorage.getItem("gabs_me");return s?JSON.parse(s):null;}catch(e){return null;}});
  const [participants,setParticipants]=useState(()=>{try{const s=localStorage.getItem("gabs_participants");return s?JSON.parse(s):SAMPLE;}catch(e){return SAMPLE;}});
  const [tables,setTables]=useState(()=>{try{const s=localStorage.getItem("gabs_tables");return s?JSON.parse(s):DEFAULT_TABLES;}catch(e){return DEFAULT_TABLES;}});
  const [times,setTimes]=useState(()=>{try{const s=localStorage.getItem("gabs_times");return s?JSON.parse(s):DEFAULT_TIMES;}catch(e){return DEFAULT_TIMES;}});
  const [tab,setTab]=useState("discover");
  const [search,setSearch]=useState("");
  const [sector,setSector]=useState("");
  const [country,setCountry]=useState("");
  const [modalP,setModalP]=useState(null);
  const [openThread,setOpenThread]=useState(null);
  const [showAI,setShowAI]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [highlight,setHighlight]=useState(null);
  const tapCount=useRef(0); const tapTimer=useRef(null);

  useEffect(()=>{
    if(window._fb){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("fb-ready",h);
    return()=>window.removeEventListener("fb-ready",h);
  },[]);

  useEffect(()=>{localStorage.setItem("gabs_lang",lang);},[lang]);

  useEffect(()=>{
    if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
  },[]);

  const selectProfile=useCallback(p=>{
    setMe(p);
    try{localStorage.setItem("gabs_me",JSON.stringify(p));}catch(e){}
  },[]);

  const switchProfile=useCallback(()=>{
    setMe(null);
    try{localStorage.removeItem("gabs_me");}catch(e){}
  },[]);

  const openConvoWith=useCallback(p=>{
    setOpenThread(p.id);
    setTab("messages");
  },[]);

  const sendMeetingFromDiscover=useCallback(async({p,table,time,msg})=>{
    if(!me||!window._fb)return;
    const fb=window._fb;
    const tid=threadId(me.id,p.id);
    const text=msg||S[lang].proposed;
    await fb.addDoc(fb.collection(fb.db,"threads",tid,"messages"),{
      text,meeting:{table,time},
      fromId:me.id,fromName:me.name,fromAvatar:me.avatar,
      ts:fb.serverTimestamp(),
    });
    openConvoWith(p);
  },[me,lang,openConvoWith]);

  const onAISelect=p=>{setHighlight(p.id);setTab("discover");setTimeout(()=>setHighlight(null),6000);};

  const t=S[lang];
  const sectorKeys=["", ...Array.from(new Set(participants.map(p=>p.sector))).sort()];
  const countryKeys=["", ...Array.from(new Set(participants.map(p=>p.country))).sort()];
  const filtered=participants.filter(p=>{
    const q=search.toLowerCase();
    return(!q||p.name.toLowerCase().includes(q)||p.company.toLowerCase().includes(q))&&(!sector||p.sector===sector)&&(!country||p.country===country);
  });

  const handleTap=()=>{tapCount.current+=1;if(tapTimer.current)clearTimeout(tapTimer.current);tapTimer.current=setTimeout(()=>{tapCount.current=0;},2000);if(tapCount.current>=5){tapCount.current=0;setShowAdmin(true);}};

  const TABS=[{key:"discover",label:t.discover},{key:"messages",label:t.messages},{key:"qr",label:t.qrTab}];

  // Loading
  if(!fbReady)return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:`linear-gradient(135deg,${NAVY},#2A5298)`}}>
      <div style={{fontSize:36,animation:"spin 1s linear infinite",color:STEEL,marginBottom:20}}>⟳</div>
      <div style={{color:"rgba(255,255,255,0.7)",fontSize:14}}>Loading GABS 2026…</div>
    </div>
  );

  // Profile not selected
  if(!me)return(
    <LangCtx.Provider value={lang}>
      <ProfilePicker participants={participants} onSelect={selectProfile}/>
    </LangCtx.Provider>
  );

  return(
    <LangCtx.Provider value={lang}>
      <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#F4F8FC",maxWidth:480,margin:"0 auto",overflow:"hidden"}}>

        <div style={{background:`linear-gradient(135deg,${NAVY} 0%,#2A5298 60%,${STEEL} 100%)`,padding:"16px 18px 0",flexShrink:0,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-30,right:-30,width:110,height:110,borderRadius:"50%",background:"rgba(255,255,255,0.05)"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div onClick={handleTap} style={{userSelect:"none"}}>
              <div style={{color:STEEL,fontSize:9,fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>6TH EDITION · ACCRA 2026</div>
              <div style={{color:"#fff",fontSize:18,fontWeight:800,fontFamily:"'Playfair Display',serif",lineHeight:1.2}}>German-African<br/>Business Summit</div>
            </div>
            <button onClick={()=>setLang(l=>l==="en"?"de":"en")} style={{background:"rgba(255,255,255,0.18)",border:"1.5px solid rgba(255,255,255,0.35)",color:"#fff",borderRadius:20,padding:"6px 16px",fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0,marginTop:4}}>
              {t.langBtn}
            </button>
          </div>
          <div style={{display:"flex",gap:2}}>
            {TABS.map(({key,label})=>(
              <button key={key} onClick={()=>setTab(key)} style={{flex:1,padding:"9px 2px",border:"none",cursor:"pointer",background:tab===key?"#fff":"transparent",color:tab===key?NAVY:"rgba(255,255,255,0.75)",fontWeight:700,fontSize:12,borderRadius:"10px 10px 0 0",transition:"all 0.2s",fontFamily:tab===key?"'Playfair Display',serif":"'DM Sans',sans-serif"}}>
                {label}
              </button>
            ))}
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
          {tab==="discover"&&(
            <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
              <Btn onClick={()=>setShowAI(true)}>{t.findMatch}</Btn>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.search} style={SS}/>
              <div style={{display:"flex",gap:8}}>
                <select value={sector} onChange={e=>setSector(e.target.value)} style={{...SS,flex:1}}>{sectorKeys.map(k=><option key={k} value={k}>{k||t.allSectors}</option>)}</select>
                <select value={country} onChange={e=>setCountry(e.target.value)} style={{...SS,flex:1}}>{countryKeys.map(k=><option key={k} value={k}>{k||t.allCountries}</option>)}</select>
              </div>
              <div style={{color:"#aaa",fontSize:12,fontWeight:600}}>{filtered.length} {t.participants}</div>
              {filtered.map((p,i)=>(
                <div key={p.id} style={{animation:`fadeIn 0.3s ease ${i*0.04}s both`}}>
                  <ParticipantCard p={p} onPropose={setModalP} onMessage={openConvoWith} isMatch={highlight===p.id} isSelf={p.id===me.id}/>
                </div>
              ))}
            </div>
          )}
          {tab==="messages"&&<MessagesView participants={participants} me={me} openThread={openThread} setOpenThread={setOpenThread}/>}
          {tab==="qr"&&<QRView/>}
        </div>

        <Footer me={me} onSwitch={switchProfile}/>

        {modalP&&<MeetingModal p={modalP} onClose={()=>setModalP(null)} onSend={({table,time,msg})=>{sendMeetingFromDiscover({p:modalP,table,time,msg});setModalP(null);}} tables={tables} times={times}/>}
        {showAI&&<AIMatchModal onClose={()=>setShowAI(false)} onSelect={p=>{onAISelect(p);setModalP(p);}} participants={participants}/>}
        {showAdmin&&<AdminModal onClose={()=>setShowAdmin(false)} participants={participants} setParticipants={setParticipants} tables={tables} setTables={setTables} times={times} setTimes={setTimes}/>}
      </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
