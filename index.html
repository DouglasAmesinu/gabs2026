:root{
  --navy:#1B3A6B;--steel:#5B9BB5;--light:#E8F2F8;--gold:#C49A2A;

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}

@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}

/* ── Header ── */

const fmtTime=ts=>{if(!ts?.seconds)return"";return new Date(ts.seconds*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});};

function avatarHTML(av,size=40){
  const fs=Math.round(size*0.35);
  return`<div class="avatar" style="width:${size}px;height:${size}px;font-size:${fs}px">${esc(av)}</div>`;
}

function bestMatch(){
  const senior=["ceo","md","managing director","director","head","partner","founder","coo","cto","cfo","president","vp"];
  return [...participants].map(p=>{
    let sc=0;
    if(p.country==="Germany")sc+=30;
    if(p.sector==="Finance")sc+=25;
    if(senior.some(s=>p.title.toLowerCase().includes(s)))sc+=20;
    sc+=Math.random()*8;
    return{...p,sc};
  }).sort((a,b)=>b.sc-a.sc)[0];
}

let discoverSearch="",discoverSector="",discoverCountry="";

  return participants.filter(p=>
    (!q||p.name.toLowerCase().includes(q)||p.company.toLowerCase().includes(q))&&
    (!discoverSector||p.sector===discoverSector)&&
    (!discoverCountry||p.country===discoverCountry)
  );
}

function bindDiscoverEvents(){

function refreshDiscoverList(){
  // Re-render only the cards, not the whole page
  const list=filteredParticipants();
  const container=document.querySelector(".discover-inner");
  if(!container)return;
  // remove old cards
  container.querySelectorAll(".p-card,.count-label").forEach(el=>el.remove());
  const countEl=document.createElement("div");
  countEl.className="count-label";
  countEl.textContent=`${list.length} ${t().discover.toLowerCase()}`;
  container.appendChild(countEl);
  list.forEach(p=>{
    const div=document.createElement("div");
    div.innerHTML=renderParticipantCard(p);
    container.appendChild(div.firstElementChild);
  });
  bindCardButtons();
}

function bindCardButtons(){

// ── Messages / Inbox ──────────────────────────────────────────────────────────
function renderInbox(){
  if(activeThreadId){
    const p=participants.find(x=>x.id===activeThreadId);
    if(p)return renderThread(p);
  }
  const entries=Object.values(inboxData).sort((a,b)=>(b.ts?.seconds||0)-(a.ts?.seconds||0));
  if(!entries.length)return`
    <div class="messages-inbox">
      <div class="inbox-header">${esc(t().messages)}</div>
      <div class="inbox-empty">
        <div style="font-size:52px">💬</div>
        <div style="color:#999;font-size:14px">${esc(t().noMsgs)}</div>
        <div style="color:#bbb;font-size:12px;line-height:1.6">${esc(t().startConv)}</div>
      </div>
    </div>`;
  return`
    <div class="messages-inbox">
      <div class="inbox-header">${esc(t().messages)}</div>
      ${entries.map(({p,text,ts})=>`
        <div class="inbox-item" data-thread="${p.id}">
          ${avatarHTML(p.av,44)}
          <div class="inbox-meta">
            <div class="inbox-name">${esc(p.name)}</div>
            <div class="inbox-preview">${esc(text||"")}</div>
          </div>
          <span style="color:${STEEL};font-size:22px">›</span>
        </div>`).join("")}
    </div>`;
}

function bindInboxEvents(){
  document.querySelectorAll(".inbox-item").forEach(el=>{
    el.addEventListener("click",()=>{
      const p=participants.find(x=>x.id===el.dataset.thread);
      if(p){activeThreadId=p.id;openThread(p);}
    });
  });
}

function initInboxListeners(){
  if(!me||!window._fb)return;
  // Clean up old
  inboxUnsubs.forEach(u=>u());
  inboxUnsubs=[];
  inboxData={};
  const fb=window._fb;
  participants.filter(p=>p.id!==me.id).forEach(p=>{
    const threadId2=tid(me.id,p.id);
    const q=fb.query(fb.collection(fb.db,"threads",threadId2,"messages"),fb.orderBy("ts","desc"));
    const unsub=fb.onSnapshot(q,snap=>{
      if(!snap.empty){
        const d=snap.docs[0].data();
        inboxData[p.id]={p,text:d.text,ts:d.ts};
      } else {
        delete inboxData[p.id];
      }
      // Update inbox badge
      updateInboxBadge();
      // If inbox tab is visible and no active thread, re-render list
      if(currentTab==="messages"&&!activeThreadId){
        document.getElementById("tab-content").innerHTML=renderInbox();
        bindInboxEvents();
      }
    });
    inboxUnsubs.push(unsub);
  });
}

function updateInboxBadge(){
  const count=Object.keys(inboxData).length;
  const tabs=document.querySelectorAll(".tab");
  tabs.forEach(tab=>{
    if(tab.dataset.tab==="messages"){
      const existing=tab.querySelector(".badge");
      if(existing)existing.remove();
      if(count>0){
        const badge=document.createElement("span");
        badge.className="badge";
        badge.textContent=count;
        tab.appendChild(badge);
      }
    }
  });
}

      <button class="send-btn ${draftText.trim()?"active":"inactive"}" id="send-btn">➤</button>
    </div>

}

function renderMessages(){
  if(!threadMessages.length)return`<div style="text-align:center;color:#bbb;font-size:13px;margin-top:48px;line-height:2">💬<br/>Start the conversation</div>`;
  return threadMessages.map(m=>{
    const mine=m.fromId===me.id;
    const cls=mine?"mine":"theirs";
    return`
    <div class="bubble-wrap ${cls}">
      ${!mine?`<div class="bubble-sender">${esc(m.fromName||"")}</div>`:""}
      <div class="bubble ${cls}">
        ${esc(m.text)}
        ${m.meeting?`<div class="meeting-pill ${cls}">📍 ${esc(m.meeting.table)}<br/>🕐 ${esc(m.meeting.time)}</div>`:""}
      </div>
      <div class="bubble-time">${fmtTime(m.ts)}</div>
    </div>`;
  }).join("");
}

function scrollToBottom(){
  const list=document.getElementById("messages-list");
  if(list)list.scrollTop=list.scrollHeight;
}

function initThreadListener(p){
  if(!me||!window._fb)return;
  const threadId2=tid(me.id,p.id);
  // Cancel existing
  if(threadUnsubs[threadId2])threadUnsubs[threadId2]();
  const fb=window._fb;
  const q=fb.query(fb.collection(fb.db,"threads",threadId2,"messages"),fb.orderBy("ts","asc"));
  threadUnsubs[threadId2]=fb.onSnapshot(q,snap=>{
    threadMessages=snap.docs.map(d=>({id:d.id,...d.data()}));
    const list=document.getElementById("messages-list");
    if(list){
      list.innerHTML=renderMessages();
      scrollToBottom();
    }
  });
  // Bind compose events
  setTimeout(()=>{
    bindComposeEvents(p);
    scrollToBottom();
  },50);
}

function bindComposeEvents(p){
  document.getElementById("thread-back")?.addEventListener("click",()=>{
    activeThreadId=null;
    threadMessages=[];
    draftText="";
    document.getElementById("tab-content").innerHTML=renderInbox();
    bindInboxEvents();
  });
  document.getElementById("thread-meet")?.addEventListener("click",()=>showMeetingModal(p,true));
  const input=document.getElementById("compose-input");
  const sendBtn=document.getElementById("send-btn");
  if(!input||!sendBtn)return;
  // Auto-resize textarea
  input.addEventListener("input",()=>{
    draftText=input.value;
    sendBtn.className=`send-btn ${draftText.trim()?"active":"inactive"}`;
    input.style.height="auto";
    input.style.height=Math.min(input.scrollHeight,100)+"px";
  });
  input.addEventListener("keydown",e=>{
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend(p);}
  });
  sendBtn.addEventListener("click",()=>doSend(p));
}

async function doSend(p,textOverride,meeting){
  const text=(textOverride||draftText).trim();
  if(!text||!me||!window._fb)return;
  draftText="";
  const input=document.getElementById("compose-input");
  if(input){input.value="";input.style.height="auto";}
  const sendBtn=document.getElementById("send-btn");
  if(sendBtn)sendBtn.className="send-btn inactive";
  const fb=window._fb;
  const threadId2=tid(me.id,p.id);
  const payload={text,fromId:me.id,fromName:me.name,fromAvatar:me.av,ts:fb.serverTimestamp()};
  if(meeting)payload.meeting=meeting;
  await fb.addDoc(fb.collection(fb.db,"threads",threadId2,"messages"),payload);
}

  function renderList(){
    const q=pickerSearch.toLowerCase();
    const filtered=participants.filter(p=>!q||p.name.toLowerCase().includes(q)||p.company.toLowerCase().includes(q));
    const list=document.getElementById("picker-list");
    if(!list)return;
    list.innerHTML=filtered.map(p=>`
      <div class="picker-item${selected?.id===p.id?" selected":""}" data-id="${p.id}">
        ${avatarHTML(p.av,42)}
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;color:${NAVY};font-size:14px;font-family:'Playfair Display',serif">${esc(p.name)}</div>
          <div style="color:#888;font-size:12px">${esc(p.title)} · ${esc(p.company)}</div>
        </div>
        ${selected?.id===p.id?`<div class="check">✓</div>`:""}
      </div>`).join("");
    list.querySelectorAll(".picker-item").forEach(el=>{
      el.addEventListener("click",()=>{
        selected=participants.find(p=>p.id===el.dataset.id)||null;

    overlay.style.opacity="0";overlay.style.transition="opacity 0.25s";
    setTimeout(()=>{overlay.remove();renderApp();},250);
  });
}

        ${times.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join("")}
      </select>
      <div class="form-label">${esc(t().addMsg)}</div>
      <textarea class="input" id="m-msg" rows="3" style="resize:none;margin-bottom:16px"></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="m-cancel">${esc(t().cancel)}</button>
        <button class="btn btn-primary" id="m-send" disabled>${esc(t().send)}</button>
      </div>`;
    const tableEl=document.getElementById("m-table");
    const timeEl=document.getElementById("m-time");
    const sendEl=document.getElementById("m-send");
    const check=()=>{if(sendEl)sendEl.disabled=!tableEl.value||!timeEl.value;};
    tableEl?.addEventListener("change",check);
    timeEl?.addEventListener("change",check);
    document.getElementById("m-cancel")?.addEventListener("click",()=>overlay.remove());
    sendEl?.addEventListener("click",async()=>{
      const table=tableEl.value,time=timeEl.value,msg=document.getElementById("m-msg").value.trim();
      if(!table||!time)return;
      document.getElementById("meeting-content").innerHTML=`<div style="text-align:center;padding:40px 0"><div style="font-size:52px">✅</div><div style="color:${NAVY};font-weight:700;font-size:16px;font-family:'Playfair Display',serif;margin-top:14px">${esc(t().sent)}</div></div>`;
      // Send to Firestore
      if(fromThread){
        await doSend(p,msg||"Meeting proposed ✓",{table,time});
      } else {
        openThread(p);
        setTimeout(async()=>{await doSend(p,msg||"Meeting proposed ✓",{table,time});},300);
      }
      setTimeout(()=>overlay.remove(),1600);
    });
  }
  renderForm();
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
}

// ── AI match modal ────────────────────────────────────────────────────────────

      <div style="font-weight:700;color:${NAVY};font-size:17px;font-family:'Playfair Display',serif;margin-bottom:20px">${esc(t().yourMatch)}</div>
      <div id="ai-content" style="text-align:center;padding:40px 0">

      </div>

          <div style="color:#888;font-size:12px">${esc(m.company)}</div>

      <div class="ai-reason" style="text-align:left;margin-bottom:18px">
        ${esc(lang==="de"?`${m.name} von ${m.company} (${m.country}) ist ein idealer GABS-Kontakt. Fokus auf ${m.sector} mit starker Entscheidungsbefugnis.`:`${m.name} from ${m.company} (${m.country}) is an ideal GABS contact. Their ${m.sector} focus and seniority create a strong cross-border opportunity.`)}

        <button class="btn btn-ghost" id="ai-cancel">${esc(t().cancel)}</button>
        <button class="btn btn-primary" id="ai-propose">${esc(t().propose)} →</button>

}

// ── Admin modal ───────────────────────────────────────────────────────────────
function showAdminModal(){
  const overlay=makeOverlay();
  function renderMain(){
    overlay.innerHTML=`
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <div>
          <div style="font-weight:800;color:${NAVY};font-size:16px;font-family:'Playfair Display',serif">⚙️ ${esc(t().adminTitle)}</div>
          <div style="font-size:12px;color:#999;margin-top:2px">${participants.length} ${esc(t().loaded)}</div>
        </div>
        <button class="btn btn-ghost" id="a-close" style="width:auto;padding:7px 16px">${esc(t().close)}</button>
      </div>
      <button class="btn" style="background:${LIGHT};color:${NAVY};border:2px dashed ${STEEL};margin-bottom:10px" id="a-dl">${esc(t().dlTpl)}</button>
      <input type="file" id="csv-file" accept=".csv" style="display:none"/>
      <button class="btn btn-primary" style="margin-bottom:10px" id="a-upload">${esc(t().upCSV)}</button>
      <button class="btn btn-ghost" style="margin-bottom:10px" id="a-rooms">🏨 ${esc(t().editRooms)}</button>
      <div id="a-feedback" style="margin-bottom:8px"></div>
      <button class="btn btn-muted" style="margin-bottom:10px" id="a-reset">${esc(t().reset)}</button>
      <div style="font-size:11px;color:#ccc;text-align:center">${esc(t().csvHint)}</div>
    </div>`;
    document.getElementById("a-close")?.addEventListener("click",()=>overlay.remove());
    document.getElementById("a-dl")?.addEventListener("click",()=>{
      const csv=["name,company,sector,country,title","Kwame Asante,GoldCoast Ventures,Finance,Ghana,CEO"].join("\n");
      const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="GABS2026_template.csv";document.body.appendChild(a);a.click();document.body.removeChild(a);
    });
    document.getElementById("a-upload")?.addEventListener("click",()=>document.getElementById("csv-file")?.click());
    document.getElementById("csv-file")?.addEventListener("change",e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const lines=ev.target.result.trim().split("\n").filter(l=>l.trim());
          if(lines.length<2)throw new Error("Need header + at least 1 row");
          const headers=lines[0].split(",").map(h=>h.trim().toLowerCase().replace(/"/g,""));
          const req=["name","company","sector","country","title"];
          const miss=req.filter(r=>!headers.includes(r));
          if(miss.length)throw new Error("Missing: "+miss.join(", "));
          const parsed=lines.slice(1).map((line,i)=>{
            const vals=line.split(",").map(v=>v.trim().replace(/"/g,""));
            const row=Object.fromEntries(headers.map((h,idx)=>[h,vals[idx]||""]));
            return{id:String(i+1),...row,av:row.name.split(" ").slice(0,2).map(w=>w[0]?.toUpperCase()||"").join("")};
          }).filter(p=>p.name);
          participants=parsed;
          try{localStorage.setItem("gabs_participants",JSON.stringify(parsed));}catch(e){}
          const fb=document.getElementById("a-feedback");
          if(fb)fb.innerHTML=`<div style="background:#E8F5E9;border-radius:10px;padding:10px 14px;font-size:13px;color:#2E7D32">✓ ${parsed.length} ${t().loaded}</div>`;
        }catch(err){
          const fb=document.getElementById("a-feedback");
          if(fb)fb.innerHTML=`<div style="background:#FFEBEE;border-radius:10px;padding:10px 14px;font-size:13px;color:#C62828">${esc(err.message)}</div>`;
        }
      };
      reader.readAsText(file);e.target.value="";
    });
    document.getElementById("a-reset")?.addEventListener("click",()=>{
      participants=SAMPLE;try{localStorage.removeItem("gabs_participants");}catch(e){}
      const fb=document.getElementById("a-feedback");
      if(fb)fb.innerHTML=`<div style="background:#E8F5E9;border-radius:10px;padding:10px 14px;font-size:13px;color:#2E7D32">✓ Reset</div>`;
    });
    document.getElementById("a-rooms")?.addEventListener("click",renderRooms);
  }

  function renderRooms(){
    overlay.innerHTML=`
    <div class="sheet">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <button id="rooms-back" style="background:none;border:none;font-size:22px;cursor:pointer;color:${NAVY}">←</button>
        <div style="font-weight:800;color:${NAVY};font-size:15px;font-family:'Playfair Display',serif">${esc(t().editRooms)}</div>
      </div>
      <div class="form-label">${esc(t().roomsLbl)}</div>
      <textarea class="input" id="rooms-txt" rows="8" style="resize:none;margin-bottom:12px;font-size:13px;line-height:1.8">${esc(tables.join("\n"))}</textarea>
      <div class="form-label">${esc(t().timesLbl)}</div>
      <textarea class="input" id="times-txt" rows="7" style="resize:none;margin-bottom:16px;font-size:13px;line-height:1.8">${esc(times.join("\n"))}</textarea>
      <button class="btn btn-primary" id="rooms-save">${esc(t().saveRooms)}</button>
    </div>`;
    document.getElementById("rooms-back")?.addEventListener("click",renderMain);
    document.getElementById("rooms-save")?.addEventListener("click",()=>{
      const nr=document.getElementById("rooms-txt").value.split("\n").map(r=>r.trim()).filter(Boolean);
      const nt=document.getElementById("times-txt").value.split("\n").map(r=>r.trim()).filter(Boolean);
      if(!nr.length||!nt.length)return;
      tables=nr;times=nt;
      try{localStorage.setItem("gabs_tables",JSON.stringify(nr));localStorage.setItem("gabs_times",JSON.stringify(nt));}catch(e){}
      overlay.remove();
    });
  }

  document.body.appendChild(overlay);
  renderMain();
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
}

// ── Overlay helper ────────────────────────────────────────────────────────────
function makeOverlay(center=false){
  const el=document.createElement("div");
  el.className="overlay"+(center?" center":"");
  return el;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
function boot(){
  const app=document.getElementById("app");
  app.style.display="flex";
  document.getElementById("loader").classList.add("hidden");
  if(!me){showPicker();return;}
  renderApp();
}

// Wait for Firebase
if(window._fb){
  boot();
} else {
  window.addEventListener("fb-ready",boot,{once:true});
  // Fallback: boot without Firebase after 3s
  setTimeout(()=>{if(!window._fb){console.warn("Firebase timeout — booting without");boot();}},3000);
}

// QR after render
const _origRenderApp=renderApp;
window.renderApp=function(){_origRenderApp();if(currentTab==="qr")setTimeout(initQR,100);};

// SW
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
