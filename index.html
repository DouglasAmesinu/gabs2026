.cnt{color:#bbb;font-size:12px;font-weight:600}

// ── Helpers ────────────────────────────────────────────────────────────────
const t=()=>S[lang];
const tid=(a,b)=>[a,b].sort().join("__");
const esc=s=>String(s??'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtTime=ts=>ts?.seconds?new Date(ts.seconds*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"";
function avHTML(av,sz=40){const fs=Math.round(sz*.35);return`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${fs}px">${esc(av)}</div>`;}
function initials(name){return name.trim().split(" ").filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("");}
function makeOv(center=false){const el=document.createElement("div");el.className="ov"+(center?" ctr":"");return el;}

function bestMatch(){
  const s=["ceo","md","managing director","director","head","partner","founder","coo","cto","cfo","president","vp"];
  const pool=participants.filter(p=>p.id!==me?.id);
  if(!pool.length)return null;
  return pool.map(p=>{let sc=0;if(p.country==="Germany")sc+=30;if(p.sector==="Finance")sc+=25;if(s.some(x=>p.title?.toLowerCase().includes(x)))sc+=20;sc+=Math.random()*8;return{...p,sc};}).sort((a,b)=>b.sc-a.sc)[0];
}

// Slot blocking
function saveSlots(){try{localStorage.setItem("gabs_slots",JSON.stringify(bookedSlots));}catch(e){}}
function timeToMins(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function minsToTime(m){return`${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;}
function bookSlot(myId,theirId,startTime,durMins){
  const end=minsToTime(timeToMins(startTime)+durMins);
  [myId,theirId].forEach(id=>{if(!bookedSlots[id])bookedSlots[id]=[];bookedSlots[id].push({start:startTime,end});});
  saveSlots();
}
function isBlocked(pid,start,dur){
  return(bookedSlots[pid]||[]).some(s=>{const bs=timeToMins(s.start),be=timeToMins(s.end),ns=timeToMins(start),ne=ns+dur;return ns<be&&ne>bs;});
}

// ── Firestore participant sync ──────────────────────────────────────────────
function startParticipantListener(){
  if(!window._fb)return;
  const fb=window._fb;
  // Listen to approved participants only
  const q=fb.query(fb.collection(fb.db,"participants"),fb.where("status","==","approved"));
  participantsUnsub=fb.onSnapshot(q,snap=>{
    participants=snap.docs.map(d=>({id:d.id,...d.data()}));
    // Update discover if on that tab
    if(currentTab==="discover"){
      const di=document.querySelector(".disc-inner");
      if(di)refreshDisc();
    }
    // Update picker list if entry screen is showing
    const pl=document.getElementById("picker-list");
    if(pl)renderPickerList();
    // Attach message listeners for any newly-registered participants
    if(me)startInbox();
  });

  // Listen to pending registrations (admin only)
  const q2=fb.query(fb.collection(fb.db,"participants"),fb.where("status","==","pending"));
  fb.onSnapshot(q2,snap=>{
    pendingRegs=snap.docs.map(d=>({id:d.id,...d.data()}));
    updateAdminBadge();
  });
}

function updateAdminBadge(){
  // No visible badge — admin accesses via 5-tap or footer ⚙
}

// ── Language — apply in place, no full re-render ───────────────────────────
function applyLang(){
  const lb=document.getElementById("lbtn");if(lb)lb.textContent=t().langBtn;
  // If on schedule, re-render it (static content, simplest fix)
  if(currentTab==="schedule"){const tc=document.getElementById("tc");if(tc)tc.innerHTML=renderSchedule();}
  const tabKeys=["discover","messages","schedule"];
  const tabLabels=[t().discover,t().messages,t().schedule];
  document.querySelectorAll(".tab").forEach(b=>{const i=tabKeys.indexOf(b.dataset.tab);if(i>=0){const badge=b.querySelector(".badge");b.textContent=tabLabels[i];if(badge)b.appendChild(badge);}});
  const si=document.getElementById("si");if(si)si.placeholder=t().search;
  const ss=document.getElementById("sec-sel");if(ss&&ss.options[0])ss.options[0].text=t().allSectors;
  const cs=document.getElementById("cnt-sel");if(cs&&cs.options[0])cs.options[0].text=t().allCountries;
  const ai=document.getElementById("ai-btn");if(ai)ai.textContent=t().findMatch;
  const sw=document.getElementById("sw-btn");if(sw)sw.textContent="↩ "+t().switchProfile;
  const ih=document.getElementById("inbox-hdr");if(ih)ih.textContent=t().messages;
  const tt=document.getElementById("allTimes");if(tt)tt.textContent="🕐 "+t().allTimes;
}

// ── App render ──────────────────────────────────────────────────────────────
function renderApp(){
  const app=document.getElementById("app");
  app.innerHTML=renderHdr()+`<div class="scroll" id="tc">${renderTab()}</div>`+renderFtr();
  bindHdr();bindFtr();bindTab();
  if(!inboxStarted&&me)startInbox();
}

function renderHdr(){
  const tabs=[{k:"discover",l:t().discover},{k:"messages",l:t().messages},{k:"schedule",l:t().schedule}];
  const msgCount=Object.keys(inboxData).length;
  return`<div id="hdr">
    <div class="hdr-top">
      <div class="hdr-title" id="htitle"><div class="eyebrow">6TH EDITION · ACCRA 2026</div><div class="hdr-name">German-African<br/>Business Summit</div></div>
      <button class="btn lang-btn" id="lbtn">${esc(t().langBtn)}</button>
    </div>
    <div class="tabs">${tabs.map(tb=>`<button class="tab${currentTab===tb.k?" on":""}" data-tab="${tb.k}">${esc(tb.l)}${tb.k==="messages"&&msgCount>0?`<span class="badge">${msgCount}</span>`:""}</button>`).join("")}</div>
  </div>`;
}

function bindHdr(){
  // Lang button handled by document-level delegation (see bottom of script)
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{currentTab=b.dataset.tab;activeThreadId=null;threadMessages=[];draftText="";renderApp();});
}

// Single source of truth for the language toggle. Using document-level
// delegation means it works correctly no matter when #lbtn or #e-lang
// appear in the DOM — header, entry screen, after re-renders, after
// redirects — there is exactly one code path, so it cannot get out of sync.
document.addEventListener("click",e=>{
  const btn=e.target.closest("#lbtn,#e-lang");
  if(!btn)return;
  lang=lang==="en"?"de":"en";
  localStorage.setItem("gabs_lang",lang);
  if(document.getElementById("entry")&&typeof window._rerenderEntry==="function"){
    window._rerenderEntry();
  } else if(me){
    renderApp();
  }
});

const ADMIN_PIN="2026";
function bindFtr(){
  document.getElementById("sw-btn")?.addEventListener("click",()=>{me=null;localStorage.removeItem("gabs_me");inboxStarted=false;inboxUnsubs.forEach(u=>u());inboxUnsubs=[];inboxData={};showEntry();});
  document.getElementById("admin-access")?.addEventListener("click",()=>{
    showPinPrompt();
  });
}
function showPinPrompt(){
  const ov=makeOv(true);
  ov.innerHTML=`<div class="sheet pop" style="max-width:320px;text-align:center">
    <div style="font-size:28px;margin-bottom:8px">🔐</div>
    <div style="font-weight:700;color:${NAVY};font-size:15px;margin-bottom:6px">Admin Access</div>
    <div style="color:#888;font-size:13px;margin-bottom:16px">Enter your 4-digit PIN</div>
    <input class="inp" id="pin-inp" type="password" inputmode="numeric" maxlength="4" placeholder="••••" style="text-align:center;font-size:22px;letter-spacing:8px;margin-bottom:12px"/>
    <div id="pin-err" style="color:var(--r);font-size:12px;min-height:16px;margin-bottom:8px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn bg" id="pin-cancel">Cancel</button>
      <button class="btn bp" id="pin-ok">Enter</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const inp=document.getElementById("pin-inp");
  setTimeout(()=>inp?.focus(),100);
  const tryPin=()=>{
    if(inp.value===ADMIN_PIN){ov.remove();showAdmin();}
    else{const err=document.getElementById("pin-err");if(err)err.textContent="Incorrect PIN. Try again.";inp.value="";}
  };
  inp?.addEventListener("keydown",e=>{if(e.key==="Enter")tryPin();});
  document.getElementById("pin-ok")?.addEventListener("click",tryPin);
  document.getElementById("pin-cancel")?.addEventListener("click",()=>ov.remove());
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
}

function renderTab(){
  if(currentTab==="discover")return renderDiscover();
  if(currentTab==="messages")return activeThreadId?renderThread():renderInbox();
  if(currentTab==="schedule")return renderSchedule();
  return"";
}
function bindTab(){
  if(currentTab==="discover")bindDiscover();
  else if(currentTab==="messages"){if(activeThreadId){const p=participants.find(x=>x.id===activeThreadId);if(p){initThread(p);bindCompose(p);}}else bindInboxRows();}
}

// ── Discover ───────────────────────────────────────────────────────────────
function filtered(){
  const q=discSearch.toLowerCase();
  return participants.filter(p=>
    (!q||p.name.toLowerCase().includes(q)||p.company?.toLowerCase().includes(q))&&
    (!discSector||p.sector===discSector)&&
    (!discCountry||p.country===discCountry)
  );
}

function pCardHTML(p){
  const self=me&&p.id===me.id;
  return`<div class="p-card${self?" self":""}" data-pid="${p.id}">
    ${self?`<span class="chip" style="background:var(--l);color:var(--s)">👤 ${esc(t().you)}</span>`:""}
    <div class="p-top">${avHTML(p.av||initials(p.name||"?"),46)}<div class="p-info"><div class="p-name">${esc(p.name)}</div><div class="p-role">${esc(p.title||"")}</div><div class="p-co">${esc(p.company||"")}</div></div></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap"><span class="chip">${esc(p.sector||"")}</span><span class="chip">${esc(p.country||"")}</span></div>
    ${(p.phone||p.linkedin)?`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:2px">
      ${p.phone?`<a href="tel:${esc(p.phone)}" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--s);text-decoration:none;font-weight:600">📞 ${esc(p.phone)}</a>`:""}
      ${p.linkedin?`<a href="https://${esc(p.linkedin.replace(/^https?:\/\//,""))}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--s);text-decoration:none;font-weight:600">🔗 LinkedIn</a>`:""}
    </div>`:""}
    ${self?"":`<div class="p-acts"><button class="btn bg p-msg" data-id="${p.id}" style="padding:9px 8px;font-size:13px">💬 ${esc(t().message)}</button><button class="btn bp p-mt" data-id="${p.id}" style="padding:9px 8px;font-size:13px">📅 ${esc(t().propose)} →</button></div>`}
  </div>`;
}

function renderDiscover(){
  const secs=["", ...Array.from(new Set(participants.map(p=>p.sector).filter(Boolean))).sort()];
  const cnts=["", ...Array.from(new Set(participants.map(p=>p.country).filter(Boolean))).sort()];
  const list=filtered();
  if(participants.length===0){
    return`<div class="disc-inner"><div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:12px">👥</div><div style="font-weight:700;color:${NAVY};font-size:15px;">${esc(t().noParticipants)}</div><div style="color:#aaa;font-size:13px;margin-top:6px;line-height:1.6">${esc(t().noParticipantsSub)}</div></div></div>`;
  }
  return`<div class="disc-inner">
    <button class="btn bp" id="ai-btn">${esc(t().findMatch)}</button>
    <input class="inp" id="si" placeholder="${esc(t().search)}" value="${esc(discSearch)}" autocomplete="off"/>
    <div class="filters">
      <select class="inp" id="sec-sel">${secs.map(s=>`<option value="${esc(s)}"${discSector===s?" selected":""}>${esc(s||t().allSectors)}</option>`).join("")}</select>
      <select class="inp" id="cnt-sel">${cnts.map(c=>`<option value="${esc(c)}"${discCountry===c?" selected":""}>${esc(c||t().allCountries)}</option>`).join("")}</select>
    </div>
    <div class="cnt" id="p-cnt">${list.length} ${esc(t().discover.toLowerCase())}</div>
    <div id="cards-wrap">${list.map(p=>pCardHTML(p)).join("")}</div>
  </div>`;
}

function bindDiscover(){
  document.getElementById("ai-btn")?.addEventListener("click",showAI);
  const si=document.getElementById("si");
  if(si){
    si.oninput=e=>{
      discSearch=e.target.value.toLowerCase();
      // CSS filter — no DOM rebuild, keyboard stays open
      document.querySelectorAll(".p-card").forEach(card=>{
        const id=card.dataset.pid;
        const p=participants.find(x=>x.id===id);
        if(!p){card.style.display="";return;}
        const match=!discSearch||p.name.toLowerCase().includes(discSearch)||p.company?.toLowerCase().includes(discSearch);
        card.style.display=match?"":"none";
      });
      const visible=document.querySelectorAll("#cards-wrap .p-card:not([style*='display: none']):not([style*='display:none'])").length;
      const cnt=document.getElementById("p-cnt");
      if(cnt)cnt.textContent=`${visible} ${t().discover.toLowerCase()}`;
    };
  }
  const ss=document.getElementById("sec-sel");
  if(ss)ss.onchange=e=>{discSector=e.target.value;refreshDisc();};
  const cs=document.getElementById("cnt-sel");
  if(cs)cs.onchange=e=>{discCountry=e.target.value;refreshDisc();};
  bindCards();
}

function refreshDisc(){
  const wrap=document.getElementById("cards-wrap");if(!wrap)return;
  const list=filtered();
  wrap.innerHTML=list.map(p=>pCardHTML(p)).join("");
  const cnt=document.getElementById("p-cnt");
  if(cnt)cnt.textContent=`${list.length} ${t().discover.toLowerCase()}`;
  bindCards();
  // Reset search filter display
  if(discSearch){
    document.querySelectorAll(".p-card").forEach(card=>{
      const id=card.dataset.pid;
      const p=participants.find(x=>x.id===id);
      if(!p)return;
      const match=p.name.toLowerCase().includes(discSearch)||p.company?.toLowerCase().includes(discSearch);
      card.style.display=match?"":"none";
    });
  }
}

function bindCards(){
  document.querySelectorAll(".p-msg").forEach(b=>b.onclick=()=>{const p=participants.find(x=>x.id===b.dataset.id);if(p)openThread(p);});
  document.querySelectorAll(".p-mt").forEach(b=>b.onclick=()=>{const p=participants.find(x=>x.id===b.dataset.id);if(p)showMeeting(p);});
}

  return`<div class="thread">
    <div class="t-hdr">
      <span class="t-back" id="t-back">←</span>
      ${avHTML(p.av||initials(p.name||"?"),36)}

      <textarea class="cinp" id="cinp" placeholder="${esc(t().typeMsg)}" rows="1">${esc(draftText)}</textarea>
      <div class="sbtn ${draftText.trim()?"on":"off"}" id="sbtn">➤</div>
    </div>
  </div>`;
}

// Init EmailJS once when page loads
if(window.emailjs){try{window.emailjs.init(EMAILJS_PUBLIC_KEY);}catch(e){}}
else{document.addEventListener("DOMContentLoaded",()=>{if(window.emailjs)try{window.emailjs.init(EMAILJS_PUBLIC_KEY);}catch(e){}});}

function sendConfirmationEmail({name,email,company,title,ticket,status}){
  if(!window.emailjs){console.warn("EmailJS not loaded");return;}
  _sendEmail({name,email,company,title,ticket,status});
}
function _sendEmail({name,email,company,title,ticket,status}){
  if(EMAILJS_SERVICE_ID==="YOUR_SERVICE_ID")return; // Not configured yet
  const templateParams={
    to_name:name,
    to_email:email,
    company,
    title,
    ticket_ref:ticket,
    status:status==="approved"?"Confirmed ✓":"Pending review",
    app_url:APP_URL,
    event_dates:"23–25 November 2026",
    event_venue:"Accra, Ghana",
  };
  window.emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,templateParams)
    .then(()=>console.log("Confirmation email sent"))
    .catch(e=>console.warn("Email failed:",e));
}
// ── ICS calendar file generator ───────────────────────────────────────────
function generateGoogleCalURL(meeting, fromName, toName){
  const date=meeting.day||"20261124";
  const[h,m]=(meeting.start||"09:00").split(":").map(Number);
  const pad=n=>String(n).padStart(2,"0");
  const startStr=`${date}T${pad(h)}${pad(m)}00`;
  const endMins=h*60+m+(meeting.dur||30);
  const endStr=`${date}T${pad(Math.floor(endMins/60))}${pad(endMins%60)}00`;
  const title=encodeURIComponent(`GABS 2026 B2B Meeting: ${fromName} & ${toName}`);
  const details=encodeURIComponent(`B2B Meeting at GABS 2026\nVenue: ${meeting.loc||""}\nAll times GMT (Accra time)`);
  const loc=encodeURIComponent(meeting.loc||"GABS 2026 Venue, Accra");
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startStr}/${endStr}&details=${details}&location=${loc}`;
}

function generateICS(meeting, fromName, toName){
  // Use the actual meeting day if available, fallback to Day 2
  const base=meeting.day||"20261124";
  const[h,m]=(meeting.start||"09:00").split(":").map(Number);
  const startDt=`${base}T${String(h).padStart(2,"0")}${String(m).padStart(2,"0")}00`;
  const endMins=h*60+m+(meeting.dur||30);
  const endH=Math.floor(endMins/60),endM=endMins%60;
  const endDt=`${base}T${String(endH).padStart(2,"0")}${String(endM).padStart(2,"0")}00`;
  const uid=`gabs2026-${Date.now()}@gabsb2b`;
  const ics=[
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//GABS 2026//B2B Networking//EN",
    "BEGIN:VEVENT",
    `UID:${uid}`,
    `DTSTART:${startDt}`,
    `DTEND:${endDt}`,
    `SUMMARY:GABS 2026 B2B Meeting: ${fromName} & ${toName}`,
    `LOCATION:${meeting.loc||"GABS 2026 Venue"}`,
    `DESCRIPTION:B2B Meeting at GABS 2026\nDate: ${meeting.dayLabel||meeting.day||""}\nTime: ${meeting.start} (${meeting.dur} min)\nVenue: ${meeting.loc||""}\nAll times GMT (Accra time)\nBook your flight: gabs2026.com`,
    "STATUS:CONFIRMED",
    "END:VEVENT",
    "END:VCALENDAR"
  ].join("\r\n");
  const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`GABS2026_Meeting_${fromName.replace(/\s+/g,"_")}.ics`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function scrollBottom(){const el=document.getElementById("msgs");if(el)el.scrollTop=el.scrollHeight;}

function initThread(p){
  if(!me||!window._fb)return;
  if(threadUnsub){threadUnsub();threadUnsub=null;}
  const fb=window._fb;
  const tid2=tid(me.id,p.id);
  const q=fb.query(fb.collection(fb.db,"threads",tid2,"messages"),fb.orderBy("ts","asc"));
  threadUnsub=fb.onSnapshot(q,snap=>{
    threadMessages=snap.docs.map(d=>({id:d.id,...d.data()}));
    const msgs=document.getElementById("msgs");
    if(msgs){msgs.innerHTML=renderMsgs();scrollBottom();bindRespBtns(p);}
  });
  setTimeout(scrollBottom,100);
}

function bindCompose(p){
  document.getElementById("t-back")?.addEventListener("click",()=>{activeThreadId=null;threadMessages=[];draftText="";if(threadUnsub){threadUnsub();threadUnsub=null;}renderApp();});
  document.getElementById("t-meet")?.addEventListener("click",()=>showMeeting(p,true));
  const inp=document.getElementById("cinp");
  const sbt=document.getElementById("sbtn");
  if(!inp||!sbt)return;
  inp.addEventListener("input",()=>{draftText=inp.value;sbt.className=`sbtn ${draftText.trim()?"on":"off"}`;inp.style.height="auto";inp.style.height=Math.min(inp.scrollHeight,96)+"px";});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend(p);}});
  sbt.onclick=()=>{if(draftText.trim())doSend(p);};
}

function bindRespBtns(p){
  document.querySelectorAll(".mresp-btn").forEach(btn=>{
    btn.onclick=async()=>{
      // Google Calendar button
      if(btn.dataset.gcal){
        const msg=threadMessages.find(m=>m.id===btn.dataset.gcal);
        if(msg&&msg.meeting){window.open(generateGoogleCalURL(msg.meeting,me.name,p.name),"_blank");}
        return;
      }
      // ICS download button
      if(btn.dataset.ics){
        const msg=threadMessages.find(m=>m.id===btn.dataset.ics);
        if(msg&&msg.meeting)generateICS(msg.meeting,me.name,p.name);
        return;
      }
      if(!window._fb)return;
      const fb=window._fb;
      const tid2=tid(me.id,p.id);
      await fb.updateDoc(fb.doc(fb.db,"threads",tid2,"messages",btn.dataset.mid),{resp:btn.dataset.resp});
    };
  });
}

async function doSend(p,textOverride,meeting){
  const text=(textOverride||draftText).trim();
  if(!text||!me||!window._fb)return;
  draftText="";
  const inp=document.getElementById("cinp");
  const sbt=document.getElementById("sbtn");
  if(inp){inp.value="";inp.style.height="auto";}
  if(sbt)sbt.className="sbtn off";
  const fb=window._fb;
  const tid2=tid(me.id,p.id);
  const payload={text,fromId:me.id,fromName:me.name,fromAvatar:me.av||initials(me.name),ts:fb.serverTimestamp()};
  if(meeting)payload.meeting=meeting;
  await fb.addDoc(fb.collection(fb.db,"threads",tid2,"messages"),payload);
}

let inboxListenedIds=new Set();
function startInbox(){
  if(!me||!window._fb)return;
  inboxStarted=true;
  const fb=window._fb;
  // Only attach listeners for participants not already listened to.
  // Safe to call repeatedly whenever the participant list grows.
  participants.filter(p=>p.id!==me.id&&!inboxListenedIds.has(p.id)).forEach(p=>{
    inboxListenedIds.add(p.id);
    const q=fb.query(fb.collection(fb.db,"threads",tid(me.id,p.id),"messages"),fb.orderBy("ts","desc"));
    const u=fb.onSnapshot(q,snap=>{
      if(!snap.empty){const d=snap.docs[0].data();inboxData[p.id]={p,text:d.text,ts:d.ts};}
      else delete inboxData[p.id];
      updateMsgBadge();
      if(currentTab==="messages"&&!activeThreadId){document.getElementById("tc").innerHTML=renderInbox();bindInboxRows();}
    });
    inboxUnsubs.push(u);
  });
}

function updateMsgBadge(){
  const count=Object.keys(inboxData).length;
  document.querySelectorAll(".tab").forEach(tab=>{
    if(tab.dataset.tab==="messages"){
      tab.querySelector(".badge")?.remove();
      if(count>0){const b=document.createElement("span");b.className="badge";b.textContent=count;tab.appendChild(b);}
    }
  });
}

function bindInboxRows(){
  document.querySelectorAll(".inbox-row").forEach(row=>row.onclick=()=>{const p=participants.find(x=>x.id===row.dataset.id);if(p)openThread(p);});
}

  const ov=makeOv();
  ov.innerHTML=`<div class="sheet" id="msheet"></div>`;

  let state={loc:"",start:"",dur:30,note:"",sent:false};

  function render(){
    if(state.sent){document.getElementById("msheet").innerHTML=`<div style="text-align:center;padding:36px 0"><div style="font-size:52px">✅</div><div style="font-weight:700;color:${NAVY};font-size:16px;margin-top:14px">${esc(t().sent)}</div></div>`;setTimeout(()=>ov.remove(),1700);return;}
    const dayOpts=MEETING_DAYS.map(d=>`<option value="${d.date}"${state.day===d.date?" selected":""}>${esc(d.label)}</option>`).join("");
    const slots=allSlots();
    const slotOpts=slots.map(s=>{const blocked=state.dur&&state.day&&(isBlocked(me.id+"-"+state.day,s,state.dur)||isBlocked(p.id+"-"+state.day,s,state.dur));return`<option value="${esc(s)}"${state.start===s?" selected":""}${blocked?" disabled":""}>${esc(s)}${blocked?" (busy)":""}</option>`;});
    document.getElementById("msheet").innerHTML=`
      <div style="display:flex;gap:11px;align-items:center;margin-bottom:16px">${avHTML(p.av||initials(p.name||"?"),42)}<div><div style="font-weight:700;color:${NAVY};">${esc(p.name)}</div><div style="color:#888;font-size:12px">${esc(p.company||"")}</div></div></div>
      <div style="font-weight:700;color:${NAVY};font-size:15px;margin-bottom:14px">📅 ${esc(t().meetReq)}</div>
      <div class="lbl" style="margin-top:0">Day *</div>
      <select class="inp" id="m-day"><option value="">-- Select day --</option>${dayOpts}</select>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
        <div><div class="lbl" style="margin-top:0">${esc(t().startTime)}</div><select class="inp" id="m-start"${!state.day?" disabled":""}><option value="">--</option>${slotOpts.join("")}</select></div>
        <div><div class="lbl" style="margin-top:0">${esc(t().duration)}</div><select class="inp" id="m-dur">${DURATIONS.map(d=>`<option value="${d}"${state.dur===d?" selected":""}>${d} ${esc(t().mins)}</option>`).join("")}</select></div>
      </div>
      <div class="lbl">${esc(t().selectLoc)}</div>
      <input class="inp" id="m-loc" placeholder="e.g. Your exhibition stand, Hotel lobby, Table 4…" value="${esc(state.loc)}"/>
      <div class="lbl">${esc(t().addMsg)}</div>
      <textarea class="inp" id="m-note" rows="2" style="resize:none;margin-bottom:14px">${esc(state.note)}</textarea>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px">
        <button class="btn bg" id="m-cancel">${esc(t().cancel)}</button>
        <button class="btn bp" id="m-send" ${!state.day||!state.start||!state.loc?"disabled":""}>${esc(t().send)}</button>
      </div>`;
    const dayEl=document.getElementById("m-day");
    const locEl=document.getElementById("m-loc");
    const startEl=document.getElementById("m-start");
    const durEl=document.getElementById("m-dur");
    const sendEl=document.getElementById("m-send");
    const check=()=>{if(sendEl)sendEl.disabled=!dayEl.value||!startEl.value||!locEl.value.trim();};
    dayEl.onchange=()=>{state.day=dayEl.value;state.start="";render();};
    locEl.oninput=()=>{state.loc=locEl.value;check();};
    startEl.onchange=()=>{state.start=startEl.value;state.dur=parseInt(durEl.value)||30;render();};
    durEl.onchange=()=>{state.dur=parseInt(durEl.value)||30;state.start=startEl.value;render();};
    document.getElementById("m-cancel").onclick=()=>ov.remove();
    sendEl?.addEventListener("click",async()=>{
      const day=dayEl.value,loc=locEl.value.trim(),start=startEl.value,dur=parseInt(durEl.value)||30,note=document.getElementById("m-note").value.trim();
      if(!day||!start||!loc)return;
      const dayLabel=MEETING_DAYS.find(d=>d.date===day)?.label||day;
      bookSlot(me.id+"-"+day,p.id+"-"+day,start,dur);
      const text=note||"Meeting proposed ✓";
      const meetingData={loc,start,dur,day,dayLabel};
      if(fromThread){await doSend(p,text,meetingData);}
      else{openThread(p);setTimeout(async()=>await doSend(p,text,meetingData),300);}
      state.sent=true;render();
    });
  }
  render();
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
}

      <select class="inp" id="c-sector"><option value="">-- Select --</option>${SECTORS.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("")}</select>
      <div class="lbl">${esc(S[lang].country)} *</div>
      <select class="inp" id="c-country"><option value="">-- Select --</option>${COUNTRIES.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("")}</select>
      <div class="lbl">${esc(S[lang].email)} *</div>
      <input class="inp" id="c-email" type="email" placeholder="you@company.com" autocomplete="email"/>
      <div class="lbl">${esc(S[lang].phone)} <span style="color:#bbb;font-weight:400">(optional)</span></div>
      <input class="inp" id="c-phone" type="tel" placeholder="e.g. +49 30 12345678" autocomplete="tel"/>
      <div class="lbl">${esc(S[lang].linkedin)} <span style="color:#bbb;font-weight:400">(optional)</span></div>
      <input class="inp" id="c-linkedin" placeholder="linkedin.com/in/yourname" autocomplete="url"/>
      <div id="c-feedback"></div>
      <div style="padding:14px 0 calc(14px + var(--safe-b))">
        <button class="btn bp" id="c-submit" style="margin-top:6px">${esc(S[lang].claimBtn)}</button>
        <button class="btn bg" id="c-back" style="margin-top:10px">${esc(S[lang].cancel)}</button>
      </div>`;
  }

  function bindStage(){
    if(stage==="enter")bindEnterStage();
    else if(stage==="already")bindAlreadyStage();
    else if(stage==="invalid")bindInvalidStage();
    else if(stage==="claim")bindClaimStage();
  }

  function bindEnterStage(){
    const inp=document.getElementById("t-input");
    const goBtn=document.getElementById("t-go");
    if(inp){
      inp.oninput=e=>{ticketInput=e.target.value.toUpperCase();};
      inp.addEventListener("keydown",e=>{if(e.key==="Enter")checkTicket();});
      setTimeout(()=>inp.focus(),150);
    }
    goBtn?.addEventListener("click",checkTicket);
  }

  async function checkTicket(){
    const val=(document.getElementById("t-input")?.value||"").trim().toUpperCase();
    if(!val){
      const err=document.getElementById("t-err");
      if(err)err.innerHTML=`<div class="err">${esc(S[lang].enterTicket)}</div>`;
      return;
    }
    ticketInput=val;
    stage="checking";render();

    if(!window._fb){stage="invalid";render();return;}
    try{
      const fbs=window._fb;
      // Is this ticket already claimed by someone?
      const claimed=await fbs.getDocs(fbs.query(fbs.collection(fbs.db,"participants"),fbs.where("ticket","==",ticketInput)));
      if(!claimed.empty){
        foundParticipant={id:claimed.docs[0].id,...claimed.docs[0].data()};
        stage="already";render();
        return;
      }
      // Not claimed yet — is it a valid ticket reference at all?
      if(!validTicketRefs.includes(ticketInput)){
        stage="invalid";render();
        return;
      }
      // Valid and unclaimed — let them claim it
      stage="claim";render();
    }catch(e){
      stage="invalid";render();
    }
  }

  function bindAlreadyStage(){
    document.getElementById("a-continue")?.addEventListener("click",()=>{
      me={...foundParticipant};
      localStorage.setItem("gabs_me",JSON.stringify(me));
      if(!participants.find(p=>p.id===me.id))participants.push({...me});
      el.style.opacity="0";el.style.transition="opacity .3s";
      setTimeout(()=>{el.remove();renderApp();startInbox();},300);
    });
    document.getElementById("a-back")?.addEventListener("click",()=>{stage="enter";ticketInput="";render();});
  }

  function bindInvalidStage(){
    document.getElementById("i-back")?.addEventListener("click",()=>{stage="enter";render();});
  }

  function bindClaimStage(){
    document.getElementById("c-back")?.addEventListener("click",()=>{stage="enter";render();});
    document.getElementById("c-submit")?.addEventListener("click",async()=>{
      const name=document.getElementById("c-name")?.value.trim();
      const company=document.getElementById("c-company")?.value.trim();
      const title=document.getElementById("c-title")?.value.trim();
      const sector=document.getElementById("c-sector")?.value;
      const country=document.getElementById("c-country")?.value;
      const email=document.getElementById("c-email")?.value.trim().toLowerCase();
      const phone=document.getElementById("c-phone")?.value.trim()||"";
      const linkedin=document.getElementById("c-linkedin")?.value.trim()||"";
      const fb=document.getElementById("c-feedback");

      if(!name||!company||!title||!sector||!country||!email){
        if(fb)fb.innerHTML=`<div class="err">Please fill in all required fields.</div>`;return;
      }
      if(!email.includes("@")){if(fb)fb.innerHTML=`<div class="err">Please enter a valid email.</div>`;return;}

      if(!window._fb)return;
      const btn=document.getElementById("c-submit");
      try{
        const fbs=window._fb;
        // Double-check ticket hasn't been claimed in the meantime (race condition guard)
        const recheck=await fbs.getDocs(fbs.query(fbs.collection(fbs.db,"participants"),fbs.where("ticket","==",ticketInput)));
        if(!recheck.empty){
          if(fb)fb.innerHTML=`<div class="err">This ticket was just claimed by someone else. Please contact AHK Ghana.</div>`;
          return;
        }
        if(btn){btn.disabled=true;btn.textContent="Submitting…";}

        const docRef=await fbs.addDoc(fbs.collection(fbs.db,"participants"),{
          name,company,title,sector,country,email,phone,linkedin,ticket:ticketInput,
          av:initials(name),
          status:"approved",
          registeredAt:fbs.serverTimestamp(),
          source:"ticket-claim",
        });

        sendConfirmationEmail({name,email,company,title,ticket:ticketInput,status:"approved"});

        me={id:docRef.id,name,company,title,sector,country,email,phone,linkedin,av:initials(name),status:"approved"};
        localStorage.setItem("gabs_me",JSON.stringify(me));
        if(!participants.find(p=>p.id===me.id))participants.push({...me});

        if(fb)fb.innerHTML=`<div class="ok"><strong>✓ Welcome to GABS 2026, ${esc(name)}!</strong><br/>Taking you to the app…</div>`;
        if(btn){btn.textContent="✓ Confirmed";}

        setTimeout(()=>{
          el.style.opacity="0";el.style.transition="opacity .3s";
          setTimeout(()=>{el.remove();renderApp();startInbox();},300);
        },900);
      }catch(e){
        if(fb)fb.innerHTML=`<div class="err">Submission failed. Please try again.</div>`;
        if(btn){btn.disabled=false;btn.textContent=S[lang].claimBtn;}
      }
    });
  }

  // Expose for the document-level lang delegation
  window._rerenderEntry=render;

  document.body.appendChild(el);
  render();
}

// ── Admin panel ────────────────────────────────────────────────────────────
function showAdmin(){
  const ov=makeOv();
  let adminTab="pending";

  async function renderMain(){
    ov.innerHTML=`<div class="sheet" style="padding-bottom:calc(22px + var(--safe-b))">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-weight:800;color:${NAVY};font-size:15px;">⚙️ ${esc(t().adminTitle)}</div>
        <button class="btn bg bsm" id="a-cl">${esc(t().close)}</button>
      </div>
      <!-- Admin tabs -->
      <div class="entry-tabs" style="margin-bottom:16px">
        <div class="entry-tab${adminTab==="pending"?" on":""}" id="at-pending">${esc(t().pendingTab)} ${pendingRegs.length>0?`<span style="background:#E53935;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px">${pendingRegs.length}</span>`:""}</div>
        <div class="entry-tab${adminTab==="participants"?" on":""}" id="at-parts">${esc(t().participantsTab)}</div>
      </div>
      <div id="admin-body"></div>
    </div>`;
    document.getElementById("a-cl").onclick=()=>ov.remove();
    document.getElementById("at-pending").onclick=()=>{adminTab="pending";renderAdminBody();};
    document.getElementById("at-parts").onclick=()=>{adminTab="participants";renderAdminBody();};
    renderAdminBody();
  }

  function renderAdminBody(){
    const body=document.getElementById("admin-body");if(!body)return;
    if(adminTab==="pending")renderPendingBody(body);
    else renderParticipantsBody(body);
  }

  function renderPendingBody(body){
    if(!pendingRegs.length){body.innerHTML=`<div style="text-align:center;padding:32px 0;color:#aaa;font-size:14px">✓ ${esc(t().noPending)}</div>`;return;}
    body.innerHTML=pendingRegs.map(p=>`
      <div class="pending-card">
        <div class="pending-info">
          ${avHTML(p.av||initials(p.name||"?"),40)}
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;color:${NAVY};font-size:14px;">${esc(p.name)}</div>
            <div style="color:#888;font-size:12px">${esc(p.title||"")} · ${esc(p.company||"")}</div>
            <div style="color:${STEEL};font-size:11px">${esc(p.email||"")} · ${esc(p.country||"")}</div>
            ${p.phone?`<div style="color:#aaa;font-size:11px">📞 ${esc(p.phone)}</div>`:""}
          </div>
        </div>
        <div class="pending-acts">
          <button class="btn brd bsm" data-id="${p.id}" id="rej-${p.id}">${esc(t().rejectBtn)}</button>
          <button class="btn bgn bsm" data-id="${p.id}" id="apr-${p.id}">${esc(t().approveBtn)}</button>
        </div>
      </div>`).join("");
    pendingRegs.forEach(p=>{
      document.getElementById(`apr-${p.id}`)?.addEventListener("click",async()=>{
        if(!window._fb)return;
        await window._fb.updateDoc(window._fb.doc(window._fb.db,"participants",p.id),{status:"approved"});
      });
      document.getElementById(`rej-${p.id}`)?.addEventListener("click",async()=>{
        if(!window._fb)return;
        await window._fb.deleteDoc(window._fb.doc(window._fb.db,"participants",p.id));
      });
    });
  }

  function renderParticipantsBody(body){
    body.innerHTML=`
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn bp" id="a-up">↑ ${esc(t().uploadCSV)}</button>
      <button class="btn bg" id="a-tickets" style="margin-top:0">🎫 Upload Ticket References</button>
      <input type="file" id="tickets-file" accept=".csv,.txt" style="display:none"/>
        <button class="btn bg" id="a-exp">↓ ${esc(t().exportCSV)}</button>
        <button class="btn bg" id="a-qr">📱 ${esc(t().showQR)}</button>
        <button class="btn bm" id="a-dl">${esc(t().dlTpl)}</button>
        <div id="a-fb"></div>
        <button class="btn bm" id="a-rst">${esc(t().reset)}</button>
        <div style="font-size:11px;color:#ccc;text-align:center">${esc(t().csvHint)}</div>
      </div>
      <input type="file" id="a-csv" accept=".csv" style="display:none"/>`;

    document.getElementById("a-up").onclick=()=>document.getElementById("a-csv").click();
    document.getElementById("a-tickets").onclick=()=>document.getElementById("tickets-file").click();
    document.getElementById("tickets-file").onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        const refs=ev.target.result.split(/[\n,]/).map(r=>r.trim().toUpperCase()).filter(Boolean);
        validTicketRefs=refs;
        localStorage.setItem("gabs_tickets",JSON.stringify(refs));
        const fb=document.getElementById("a-fb");
        if(fb)fb.innerHTML=`<div class="ok">✓ ${refs.length} ticket references loaded</div>`;
      };
      r.readAsText(f);e.target.value="";
    };
    document.getElementById("a-csv").onchange=async e=>{
      const f=e.target.files[0];if(!f)return;
      const reader=new FileReader();
      reader.onload=async ev=>{
        try{
          const lines=ev.target.result.trim().split("\n").filter(l=>l.trim());
          if(lines.length<2)throw new Error("Need header + 1 row");
          const hdrs=lines[0].split(",").map(h=>h.trim().toLowerCase().replace(/"/g,""));
          const miss=["name","company","sector","country","title"].filter(x=>!hdrs.includes(x));
          if(miss.length)throw new Error("Missing: "+miss.join(", "));
          const parsed=lines.slice(1).map((line,i)=>{
            const vals=line.split(",").map(v=>v.trim().replace(/"/g,""));
            const row=Object.fromEntries(hdrs.map((h,idx)=>[h,vals[idx]||""]));
            return{...row,av:initials(row.name||"?"),status:"approved",source:"csv",_idx:i};
          }).filter(p=>p.name);
          const fb=document.getElementById("a-fb");
          if(fb)fb.innerHTML=`<div class="ok">⏳ Syncing ${parsed.length} participants…</div>`;
          if(window._fb){
            const fbs=window._fb;
            await Promise.all(parsed.map((p,i)=>fbs.setDoc(fbs.doc(fbs.db,"participants",`csv_${i}`),{...p,id:`csv_${i}`})));
            if(fb)fb.innerHTML=`<div class="ok">✓ ${parsed.length} participants synced to all devices</div>`;
          }
        }catch(err){
          const fb=document.getElementById("a-fb");
          if(fb)fb.innerHTML=`<div class="err">${esc(err.message)}</div>`;
        }
      };
      reader.readAsText(f);e.target.value="";
    };

    document.getElementById("a-exp").onclick=()=>{
      const rows=[["name","company","sector","country","title","email","status","source"],...participants.map(p=>[p.name,p.company,p.sector,p.country,p.title,p.email||"",p.status||"approved",p.source||"csv"])];
      const csv=rows.map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
      const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`GABS2026_participants_${new Date().toISOString().slice(0,10)}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);
    };

    document.getElementById("a-qr").onclick=showQR;
    document.getElementById("a-dl").onclick=()=>{
      const csv=["name,company,sector,country,title,email","Hans Mueller,Berlin Tech GmbH,Technology,Germany,Managing Director,hans@berlintech.de"].join("\n");
      const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="GABS2026_template.csv";document.body.appendChild(a);a.click();document.body.removeChild(a);
    };
    document.getElementById("a-rst").onclick=async()=>{
      if(!window._fb)return;
      const fbs=window._fb;
      const snap=await fbs.getDocs(fbs.collection(fbs.db,"participants"));
      await Promise.all(snap.docs.map(d=>fbs.deleteDoc(d.ref)));
      const fb=document.getElementById("a-fb");
      if(fb)fb.innerHTML=`<div class="ok">✓ All participants cleared</div>`;
    };
  }

  document.body.appendChild(ov);
  renderMain();
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
}

// ── QR ─────────────────────────────────────────────────────────────────────
function showQR(){
  const ov=makeOv(true);
  ov.innerHTML=`<div class="sheet pop" style="max-width:360px;text-align:center">
    <div style="font-weight:700;color:${NAVY};font-size:15px;margin-bottom:16px">📱 GABS 2026</div>
    <div style="background:linear-gradient(135deg,${NAVY},${STEEL});border-radius:20px;padding:18px;display:inline-block;margin-bottom:14px">
      <div id="qr-el" style="background:#fff;border-radius:10px;padding:8px"></div>
    </div>
    <div style="font-size:11px;color:#aaa;word-break:break-all;margin-bottom:16px">${APP_URL}</div>
    <button class="btn bg" id="qr-cl">${esc(t().close)}</button>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById("qr-cl").onclick=()=>ov.remove();
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
  setTimeout(()=>{if(window.QRCode)new QRCode(document.getElementById("qr-el"),{text:APP_URL,width:190,height:190,colorDark:NAVY,colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H});},60);
}

// ── Boot ───────────────────────────────────────────────────────────────────
async function boot(){
  document.getElementById("app").style.display="flex";
  // Secret admin access via URL hash
  if(window.location.hash==="#admin"){
    window.location.hash="";
    if(window._fb){startParticipantListener();await new Promise(r=>setTimeout(r,600));}
    document.getElementById("loader").classList.add("gone");
    showAdmin();
    return;
  }
  if(window._fb){
    // Load approved participants from Firestore
    startParticipantListener();
    // Small wait so first snapshot arrives before picker renders
    await new Promise(r=>setTimeout(r,600));
  }
  document.getElementById("loader").classList.add("gone");
  if(!me){showEntry();}
  else{renderApp();startInbox();}
}

if(window._fb){boot();}
else{window.addEventListener("fb-ready",boot,{once:true});setTimeout(()=>{if(!window._fb)boot();},3500);}

const qs=document.createElement("script");qs.src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";document.head.appendChild(qs);
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
